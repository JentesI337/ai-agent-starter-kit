<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1 class="sr-only">Calculator</h1>
    <section class="calculator" aria-label="Calculator">
      <div id="display" class="display" role="status" aria-live="polite" aria-atomic="true">0</div>
      <div class="keys" role="group" aria-label="Calculator keys">
        <button type="button" class="btn secondary" data-action="clear" aria-label="Clear all">C</button>
        <button type="button" class="btn secondary" data-action="delete" aria-label="Backspace">DEL</button>
        <button type="button" class="btn" data-value="/">÷</button>
        <button type="button" class="btn" data-value="*">×</button>

        <button type="button" class="btn" data-value="7">7</button>
        <button type="button" class="btn" data-value="8">8</button>
        <button type="button" class="btn" data-value="9">9</button>
        <button type="button" class="btn" data-value="-">−</button>

        <button type="button" class="btn" data-value="4">4</button>
        <button type="button" class="btn" data-value="5">5</button>
        <button type="button" class="btn" data-value="6">6</button>
        <button type="button" class="btn" data-value="+">+</button>

        <button type="button" class="btn" data-value="1">1</button>
        <button type="button" class="btn" data-value="2">2</button>
        <button type="button" class="btn" data-value="3">3</button>
        <button type="button" class="btn equal" data-action="equals" aria-label="Equals">=</button>

        <button type="button" class="btn span-2" data-value="0">0</button>
        <button type="button" class="btn" data-value=".">.</button>
      </div>
    </section>
  </main>
  <script src="script.js" defer></script>
</body>
</html>
