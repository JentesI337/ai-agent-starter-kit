# SEC (DEP-03): Automated dependency vulnerability scanning.
# Runs pip-audit for backend and npm audit for frontend on every push/PR
# and on a weekly schedule to catch newly disclosed CVEs.
name: Security Audit

on:
  push:
    paths:
      - 'backend/requirements*.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  pull_request:
    paths:
      - 'backend/requirements*.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  schedule:
    # Weekly scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt --strict --desc

      - name: Audit backend test dependencies
        run: pip-audit -r backend/requirements-test.txt --strict --desc
        continue-on-error: true  # test deps are less critical

  frontend-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
