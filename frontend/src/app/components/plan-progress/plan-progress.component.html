<div class="plan-stepper" [class.collapsed]="isCollapsed" [class.all-done]="allDone">
  <div class="plan-header" (click)="toggleCollapse()">
    <span class="plan-title">Plan</span>
    <span class="plan-counter">{{ completedCount }}/{{ steps.length }}</span>
    <span class="done-badge" *ngIf="allDone">completed</span>
    <span class="plan-toggle">
      <svg viewBox="0 0 16 16" width="12" height="12" [class.rotated]="!isCollapsed">
        <path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </div>

  <div class="plan-steps" [class.hidden]="isCollapsed">
    <div
      *ngFor="let step of steps; trackBy: trackStep"
      class="step"
      [class.step-pending]="step.status === 'pending'"
      [class.step-active]="step.status === 'in_progress'"
      [class.step-done]="step.status === 'completed'"
      [class.step-failed]="step.status === 'failed'"
    >
      <div class="step-indicator">
        <div class="step-icon">
          <svg *ngIf="step.status === 'completed'" viewBox="0 0 16 16" width="12" height="12">
            <path d="M3.5 8.5l3 3 6-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg *ngIf="step.status === 'failed'" viewBox="0 0 16 16" width="10" height="10">
            <path d="M4 4l8 8M12 4l-8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span *ngIf="step.status === 'pending'" class="dot"></span>
          <span *ngIf="step.status === 'in_progress'" class="spinner"></span>
        </div>
        <div class="step-connector" *ngIf="step.index < steps.length - 1"></div>
      </div>
      <div class="step-content">
        <span class="step-number">{{ step.index + 1 }}.</span>
        <span class="step-label">{{ step.description }}</span>
      </div>
    </div>
  </div>
</div>
